# Godot Web export + gdUnit4 tests via godot-ci. Runs on push/PR that
# touches godot/ or this workflow. Web export lands in builds/html5/ —
# the path nginx `game` and godot/AGENTS.md expect.
name: godot

on:
  push:
    branches: [main]
    paths:
      - 'godot/**'
      - '.github/workflows/godot-ci.yml'
      - 'scripts/install_addons.sh'
      - 'scripts/build_nakama_modules.sh'
      - 'docker-compose.dev.yml'
  pull_request:
    paths:
      - 'godot/**'
      - '.github/workflows/godot-ci.yml'
      - 'scripts/install_addons.sh'
      - 'scripts/ci_rebuild_godot_class_cache.sh'
      - 'scripts/audit_smoke_check.py'
      - 'scripts/build_nakama_modules.sh'
      - 'docker-compose.dev.yml'
  workflow_dispatch: {}

env:
  GODOT_VERSION: 4.3.0
  EXPORT_NAME: periliminal-space

jobs:
  export-web:
    name: Export Web (HTML5)
    runs-on: ubuntu-22.04
    # A healthy import+export finishes in minutes. Without this cap, a
    # headless editor stuck on a modal error dialog (e.g. a GDExtension
    # plugin failing to load — see run 29177454189) burns the full 6-hour
    # default before dying silently. Fail fast, with fetchable logs.
    timeout-minutes: 30
    container:
      image: barichello/godot-ci:4.3
    steps:
      - uses: actions/checkout@v4
        with: { lfs: true }

      - name: Locate export templates
        run: |
          set -e
          TEMPLATE_SRC="$(find / -maxdepth 6 -type d -name '*.stable' -path '*/export_templates/*' 2>/dev/null | head -n1 || true)"
          if [ -z "$TEMPLATE_SRC" ]; then
            echo "No export templates found in image — cannot Web-export." >&2
            exit 1
          fi
          echo "Templates found at: $TEMPLATE_SRC"
          mkdir -p ~/.local/share/godot/export_templates
          ln -sfn "$TEMPLATE_SRC" ~/.local/share/godot/export_templates/"$(basename "$TEMPLATE_SRC")"

      - name: Web export
        # `--import` bakes shaders/textures first. Godot 4.3 headless often
        # SIGSEGV/SIGILL on shutdown AFTER a successful pack (exit 132/139).
        # Treat builds/html5/index.html as the source of truth.
        #
        # Both godot invocations run under `timeout`: when a script/plugin
        # error makes the headless editor pop a modal dialog, it parks
        # FOREVER (see runs 29177454189 / 29462721688 — the error prints,
        # then hours of silence). A process-level timeout kills just godot,
        # so the step still fails fast WITH the error visible in this log,
        # instead of the job-level timeout-minutes nuking everything.
        run: |
          set -e
          mkdir -v -p builds/html5
          cd godot
          timeout 600 godot --headless --verbose --import || echo "(import exit $? — nonzero is normal, see above)"
          set +e
          timeout 900 godot --headless --verbose --export-release "Web" ../builds/html5/index.html
          EXPORT_EXIT=$?
          set -e
          if [ "$EXPORT_EXIT" = "124" ]; then
            echo "::error::godot export HUNG (killed by timeout) — scroll up for the SCRIPT ERROR lines that preceded the hang"
          fi
          if [ -f ../builds/html5/index.html ]; then
            echo "Web export OK (artifacts present; godot exit=${EXPORT_EXIT})"
            ls -lah ../builds/html5 | head -30
            exit 0
          fi
          # Preset path fallback if CLI path was ignored
          if [ -f build/web/index.html ]; then
            echo "Found preset path build/web — copying to builds/html5"
            mkdir -p ../builds/html5
            cp -a build/web/. ../builds/html5/
            ls -lah ../builds/html5 | head -30
            exit 0
          fi
          echo "Web export failed — no index.html (godot exit=${EXPORT_EXIT})" >&2
          exit 1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXPORT_NAME }}-html5
          path: builds/html5
          if-no-files-found: error

  headless-smokes:
    name: Headless gate smokes (boot/spine/economy/5/6/8)
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    container:
      image: barichello/godot-ci:4.3
    steps:
      - uses: actions/checkout@v4
        # No LFS — smokes exercise scripts/autoloads, not full GLB import.
      - name: Run boot + spine + economy + gates (+ gate8 SKIP without Nakama)
        run: |
          set -e
          # --quit-after 20 aborts the filesystem scan before class_name
          # cache is written; smokes then fail with AAATheme/etc undeclared.
          bash scripts/ci_rebuild_godot_class_cache.sh godot
          cd godot
          for smoke in boot_smoke layer_spine_smoke subliminal_economy_smoke gate5_smoke gate6_smoke combat_sfx_smoke gate8_smoke dialogue_layer_smoke owner_trials_smoke; do
            echo "=== $smoke ==="
            set +e
            # Spine/economy may load scenes — allow a bit longer than boot.
            timeout 180 godot --headless --path . -s "res://src/dev/${smoke}.gd"
            EXIT=$?
            set -e
            if [ "$EXIT" = "124" ]; then
              echo "::error::$smoke hung"
              exit 1
            fi
            if [ "$EXIT" != "0" ]; then
              echo "::error::$smoke failed (exit $EXIT)"
              exit 1
            fi
          done
          echo "All headless smokes OK (gate8 may SKIP without docker)"

  gate8-nakama-live:
    name: Gate 8 Nakama live (fail on SKIP)
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: godot/src/networking/nakama_modules/package-lock.json

      - name: Build Nakama modules
        run: bash scripts/build_nakama_modules.sh

      - name: Start local Nakama
        run: |
          set -e
          # Postgres healthcheck gates Nakama start (avoids migrate crash loops).
          docker compose -f docker-compose.dev.yml up -d
          echo "Waiting for Nakama :7350..."
          for i in $(seq 1 90); do
            if (echo >/dev/tcp/127.0.0.1/7350) >/dev/null 2>&1; then
              ok=1
              for j in 1 2 3 4 5; do
                sleep 1
                if ! (echo >/dev/tcp/127.0.0.1/7350) >/dev/null 2>&1; then
                  ok=0
                  echo "Nakama port flapped (attempt $i, check $j)"
                  break
                fi
              done
              if [ "$ok" = "1" ]; then
                echo "Nakama is up (attempt $i, stable)"
                docker compose -f docker-compose.dev.yml ps
                exit 0
              fi
            fi
            if [ $((i % 10)) -eq 0 ]; then
              docker compose -f docker-compose.dev.yml ps || true
              docker compose -f docker-compose.dev.yml logs --no-color | tail -40 || true
            fi
            sleep 2
          done
          echo "::error::Nakama did not become ready on :7350"
          docker compose -f docker-compose.dev.yml ps || true
          docker compose -f docker-compose.dev.yml logs --no-color | tail -160
          exit 1

      - name: Install Godot 4.3
        run: |
          set -e
          curl -fsSL -o /tmp/godot.zip \
            "https://github.com/godotengine/godot-builds/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip"
          unzip -o /tmp/godot.zip -d /tmp
          sudo mv /tmp/Godot_v4.3-stable_linux.x86_64 /usr/local/bin/godot
          godot --version

      - name: Run gate8_smoke (REQUIRE LIVE)
        env:
          GATE8_REQUIRE_LIVE: "1"
        run: |
          set -e
          # Re-confirm Nakama after Godot install gap (compose can restart).
          echo "Re-checking Nakama :7350 before smoke..."
          ready=0
          for i in $(seq 1 45); do
            if (echo >/dev/tcp/127.0.0.1/7350) >/dev/null 2>&1; then
              echo "Nakama still up (attempt $i)"
              ready=1
              break
            fi
            sleep 2
          done
          if [ "$ready" != "1" ]; then
            echo "::error::Nakama not reachable before gate8_smoke"
            docker compose -f docker-compose.dev.yml ps || true
            docker compose -f docker-compose.dev.yml logs --no-color | tail -120 || true
            exit 1
          fi
          bash scripts/ci_rebuild_godot_class_cache.sh godot
          # Class cache can take minutes — probe again immediately before smoke.
          for i in $(seq 1 30); do
            if (echo >/dev/tcp/127.0.0.1/7350) >/dev/null 2>&1; then
              break
            fi
            sleep 2
            if [ "$i" = "30" ]; then
              echo "::error::Nakama died during class-cache rebuild"
              docker compose -f docker-compose.dev.yml logs --no-color | tail -120 || true
              exit 1
            fi
          done
          cd godot
          set +e
          timeout 180 godot --headless --path . -s res://src/dev/gate8_smoke.gd | tee /tmp/gate8_live.txt
          EXIT=${PIPESTATUS[0]}
          set -e
          if [ "$EXIT" = "124" ]; then
            echo "::error::gate8_smoke hung"
            exit 1
          fi
          if grep -q 'RESULT=SKIP' /tmp/gate8_live.txt; then
            echo "::error::gate8_smoke SKIPPED — live Nakama job must PASS"
            docker compose -f ../docker-compose.dev.yml logs --no-color | tail -80 || true
            exit 1
          fi
          if ! grep -q 'RESULT=PASS' /tmp/gate8_live.txt; then
            echo "::error::gate8_smoke did not PASS (exit=$EXIT)"
            exit 1
          fi
          if [ "$EXIT" != "0" ]; then
            echo "::error::gate8_smoke failed (exit $EXIT)"
            exit 1
          fi
          echo "Gate 8 live PASS"

      - name: Teardown Nakama
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v || true

  test-gdunit4:
    name: gdUnit4 unit tests
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    container:
      image: barichello/godot-ci:4.3
    steps:
      - uses: actions/checkout@v4
        # No LFS — audit suites don't need GLBs; full asset import hangs CI.
      - name: Run gdUnit4 (skipped if addon or tests missing)
        env:
          # barichello/godot-ci images put `godot` on PATH; gdUnit4's
          # runtest.sh requires GODOT_BIN explicitly.
          GODOT_BIN: godot
        run: |
          if [ -d godot/addons/gdUnit4 ] && [ -d godot/test ] && [ "$(find godot/test -name '*Test*.gd' -o -name '*test*.gd' 2>/dev/null | head -1)" ]; then
            # Rebuild global class cache without a full asset --import.
            # Full import + Terrain3D/LFS hung for 15+ minutes in CI.
            if ! bash scripts/ci_rebuild_godot_class_cache.sh godot; then
              echo "Class cache missing after editor quit — falling back to Python smoke checks."
              if command -v python3 >/dev/null 2>&1; then
                python3 scripts/audit_smoke_check.py
              elif command -v python >/dev/null 2>&1; then
                python scripts/audit_smoke_check.py
              else
                echo "No python interpreter in image — installing python3."
                apt-get update -qq && apt-get install -y -qq python3 >/dev/null
                python3 scripts/audit_smoke_check.py
              fi
              exit $?
            fi
            cd godot
            "$GODOT_BIN" --headless --path . -s -d res://addons/gdUnit4/bin/GdUnitCmdTool.gd \
              -a test/ -c --ignoreHeadlessMode
            EXIT=$?
            "$GODOT_BIN" --headless --path . --quiet -s -d res://addons/gdUnit4/bin/GdUnitCopyLog.gd \
              -a test/ >/dev/null 2>&1 || true
            exit $EXIT
          else
            echo "gdUnit4 addon or godot/test suites not present — skipping."
          fi
