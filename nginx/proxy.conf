# Periliminal.Space — nginx reverse proxy
# Handles three domains, HTTPS termination, and Nakama API proxying.
#
# Before running:
#   1. Set CATSINO_DOMAIN, HDV_DOMAIN, PLAY_DOMAIN in your .env
#   2. Obtain certs:
#        docker run --rm -v $(pwd)/nginx/certs:/etc/letsencrypt \
#          -v $(pwd)/nginx/certbot-webroot:/var/www/certbot \
#          certbot/certbot certonly --webroot \
#          -w /var/www/certbot \
#          -d <catsino_domain> -d <hdv_domain> -d <play_domain> \
#          --email <your@email.com> --agree-tos --no-eff-email
#   3. docker-compose up -d proxy
#
# Until certs exist the HTTP-only blocks below serve everything on port 80
# (ACME challenge + redirect).  After certs are in place uncomment the HTTPS
# server blocks.

# ── Shared upstream definitions ──────────────────────────────────────────────
upstream catsino_web  { server web:3000; }
upstream hdv_web      { server web-hdv:3000; }
upstream godot_game   { server game:80; }
upstream nakama_api   { server nakama:7350; }

# ── HTTP — ACME challenge + permanent redirect to HTTPS ─────────────────────
server {
    listen 80;
    server_name _;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS (comment this block out until certs exist)
    location / {
        return 301 https://$host$request_uri;
    }
}

