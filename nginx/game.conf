# Godot HTML5 game server config
# Served behind the proxy — SharedArrayBuffer headers are added by the proxy.
# This config just serves the static files correctly.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve .pck and .wasm files with correct MIME types
    types {
        application/wasm           wasm;
        application/octet-stream   pck;
        text/html                  html;
        application/javascript     js;
        text/css                   css;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache game assets for 1 day; index.html never cached
    location ~* \.(wasm|pck|png|jpg|ogg|mp3)$ {
        expires 1d;
        add_header Cache-Control "public";
    }

    location = /index.html {
        add_header Cache-Control "no-store";
    }
}
